<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Loan Eligibility Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 text-center mb-2">Home Loan Predictor</h2>
        <p class="text-sm text-slate-500 text-center mb-6">Enter financial details to evaluate loan eligibility status instantly.</p>
        
        <form id="loanForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Monthly Income (INR)</label>
                <input type="number" id="monthly_income" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="e.g. 50000">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Age</label>
                <input type="number" id="age" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="e.g. 30">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">CIBIL Score (300 - 900)</label>
                <input type="number" id="cibil_score" min="300" max="900" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="e.g. 750">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Any Existing Active Loans?</label>
                <select id="existing_loan" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 bg-white">
                    <option value="0">No, I don't have other loans</option>
                    <option value="1">Yes, I have ongoing active loans</option>
                </select>
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-md">
                Check Loan Status
            </button>
        </form>

        <div id="resultContainer" class="mt-6 p-4 rounded-xl border text-center hidden">
            <p class="text-sm uppercase tracking-wider font-semibold text-slate-500">Prediction Result</p>
            <h3 id="resultValue" class="text-2xl font-extrabold my-1"></h3>
            <p id="resultConfidence" class="text-xs text-slate-500"></p>
        </div>
    </div>

    <script>
document.getElementById('loanForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const payload = {
        monthly_income: document.getElementById('monthly_income').value,
        age: document.getElementById('age').value,
        cibil_score: document.getElementById('cibil_score').value,
        existing_loan: document.getElementById('existing_loan').value
    };

    const container = document.getElementById('resultContainer');
    const valueText = document.getElementById('resultValue');
    const confidenceText = document.getElementById('resultConfidence');

    try {
        const response = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.status === 'success') {
            container.classList.remove('hidden');
            valueText.innerText = data.prediction;
            confidenceText.innerText = `Model Confidence: ${data.confidence}`;

            if (data.prediction === "Approved") {
                container.className = "mt-6 p-4 rounded-xl border border-emerald-200 bg-emerald-50 text-center";
                valueText.className = "text-2xl font-extrabold my-1 text-emerald-700";
            } else {
                container.className = "mt-6 p-4 rounded-xl border border-rose-200 bg-rose-50 text-center";
                valueText.className = "text-2xl font-extrabold my-1 text-rose-700";
            }
        } else {
            alert("Prediction error: " + data.message);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Could not reach backend prediction server.");
    }
});
</script>
</body>
</html>
